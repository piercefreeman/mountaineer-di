name: test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: make ci-lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: make test

  fastapi-matrix:
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - id: versions
        name: Resolve recent stable FastAPI releases
        run: |
          versions="$(uv run scripts/latest_fastapi_versions.py --patch-count 10 --minor-count 50)"
          echo "Selected FastAPI versions: ${versions}"
          echo "versions=${versions}" >> "${GITHUB_OUTPUT}"

  fastapi-compat:
    needs: [lint, test, fastapi-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        fastapi-version: ${{ fromJson(needs.fastapi-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install "fastapi==${{ matrix.fastapi-version }}"
      - run: make test

  full-build:
    needs: [lint, test, fastapi-compat]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'pull_request' &&
      contains(toJson(github.event.pull_request.labels), 'full-build'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run .github/scripts/update_version.py ${{ github.ref_name }}
      - name: Build sdist and wheel
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: [full-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
