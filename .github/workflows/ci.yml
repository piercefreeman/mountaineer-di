name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -q

  fastapi-matrix:
    name: FastAPI Matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - id: versions
        name: Resolve recent stable FastAPI releases
        run: |
          versions="$(uv run scripts/latest_fastapi_versions.py --patch-count 10 --minor-count 50)"
          echo "Selected FastAPI versions: ${versions}"
          echo "versions=${versions}" >> "${GITHUB_OUTPUT}"

  fastapi-compat:
    name: FastAPI Compat (${{ matrix.fastapi-version }})
    needs:
      - tests
      - fastapi-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        fastapi-version: ${{ fromJson(needs.fastapi-matrix.outputs.versions) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install "fastapi==${{ matrix.fastapi-version }}"

      - name: Run tests
        run: uv run pytest -q
